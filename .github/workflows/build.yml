name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission to Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: furnaceboard
          path: build/libs/furnaceboard-*.jar
          if-no-files-found: error

      - name: Extract and upload refmap from JAR
        run: unzip -p build/libs/furnaceboard-*.jar furnaceboard.refmap.json > furnaceboard.refmap.json || echo "refmap not found in JAR"

      - name: Upload refmap
        uses: actions/upload-artifact@v4
        with:
          name: furnaceboard-refmap
          path: furnaceboard.refmap.json
          if-no-files-found: warn